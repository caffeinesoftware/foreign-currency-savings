name: Lint JavaScript code
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 20.x
          cache: 'npm'
      - run: npm ci
      - run: npx next lint